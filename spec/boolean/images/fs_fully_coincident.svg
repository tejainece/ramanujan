<svg width="480" height="210" viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- ── LEFT PANEL: A and B identical ── -->
  <rect x="0" y="0" width="240" height="210" fill="#f8fafc"/>
  <text x="120" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">fully coincident paths (A = B)</text>

  <!-- A drawn first -->
  <rect x="35" y="55" width="150" height="100" fill="#dbeafe" fill-opacity="0.6" stroke="#2563eb" stroke-width="3"/>
  <!-- B drawn on top, offset slightly for visibility -->
  <rect x="37" y="57" width="150" height="100" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7,4"/>

  <text x="50"  y="88"  font-size="14" font-weight="700" fill="#1d4ed8">A</text>
  <text x="165" y="140" font-size="14" font-weight="700" fill="#5b21b6">B</text>
  <text x="110" y="65"  font-size="10" fill="#7c3aed" text-anchor="middle" font-style="italic">(B drawn dashed on top of A)</text>

  <text x="120" y="175" text-anchor="middle" font-size="11" fill="#475569">every edge of A coincides with an edge of B</text>
  <text x="120" y="187" text-anchor="middle" font-size="10" fill="#475569">extreme case of coincident-edge handling</text>

  <!-- ── DIVIDER ── -->
  <line x1="240" y1="10" x2="240" y2="200" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ── RIGHT PANEL: results of each op ── -->
  <rect x="240" y="0" width="240" height="210" fill="#f0fdf4"/>
  <text x="360" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">results — all correct</text>

  <!-- union(A,A) = A -->
  <rect x="255" y="32" width="62" height="38" fill="#bbf7d0" fill-opacity="0.8" stroke="#15803d" stroke-width="2"/>
  <text x="286" y="46" text-anchor="middle" font-size="9"  fill="#166534" font-weight="600">union(A,A)</text>
  <text x="286" y="60" text-anchor="middle" font-size="10" fill="#166534" font-weight="700">= A</text>

  <!-- intersection(A,A) = A -->
  <rect x="327" y="32" width="80" height="38" fill="#bbf7d0" fill-opacity="0.8" stroke="#15803d" stroke-width="2"/>
  <text x="367" y="46" text-anchor="middle" font-size="9"  fill="#166534" font-weight="600">intersection(A,A)</text>
  <text x="367" y="60" text-anchor="middle" font-size="10" fill="#166534" font-weight="700">= A</text>

  <!-- difference(A,A) = ∅ -->
  <rect x="255" y="80" width="75" height="38" fill="#fef3c7" fill-opacity="0.8" stroke="#d97706" stroke-width="2"/>
  <text x="293" y="94"  text-anchor="middle" font-size="9"  fill="#92400e" font-weight="600">difference(A,A)</text>
  <text x="293" y="108" text-anchor="middle" font-size="12" fill="#92400e" font-weight="700">= ∅</text>

  <!-- xor(A,A) = ∅ -->
  <rect x="340" y="80" width="60" height="38" fill="#fef3c7" fill-opacity="0.8" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="94"  text-anchor="middle" font-size="9"  fill="#92400e" font-weight="600">xor(A,A)</text>
  <text x="370" y="108" text-anchor="middle" font-size="12" fill="#92400e" font-weight="700">= ∅</text>

  <text x="360" y="148" text-anchor="middle" font-size="10" fill="#475569">falls out of Case 4 (coincident-edge) handling</text>
  <text x="360" y="161" text-anchor="middle" font-size="10" fill="#475569">no special case needed</text>
</svg>
