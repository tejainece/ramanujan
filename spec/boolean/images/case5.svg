<svg width="480" height="210" viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: system-ui, sans-serif; }
  </style>

  <!-- ── LEFT PANEL: vertex clear of edge ── -->
  <rect x="0" y="0" width="240" height="210" fill="#f8fafc"/>
  <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">vertex clear of edge</text>

  <!-- Shape B: horizontal band, top edge at y=130 -->
  <rect x="20" y="130" width="200" height="55" fill="#ede9fe" fill-opacity="0.7" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="195" y="165" font-size="14" font-weight="700" fill="#5b21b6">B</text>

  <!-- Shape A: triangle, bottom vertex at y=105 (gap above B's top edge at y=130) -->
  <polygon points="120,42 50,105 190,105"
           fill="#dbeafe" fill-opacity="0.7" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="120" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">A</text>

  <!-- Gap indicator -->
  <line x1="120" y1="105" x2="120" y2="130" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="128" y="120" font-size="10" fill="#374151">gap</text>

  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#475569">A's vertex does not touch B's boundary</text>

  <!-- ── DIVIDER ── -->
  <line x1="240" y1="10" x2="240" y2="200" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ── RIGHT PANEL: vertex on edge (also supported) ── -->
  <rect x="240" y="0" width="240" height="210" fill="#f0fdf4"/>
  <text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">vertex on edge — supported</text>

  <!-- Shape B: top edge at y=120 -->
  <rect x="260" y="120" width="200" height="55" fill="#ede9fe" fill-opacity="0.7" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="432" y="155" font-size="14" font-weight="700" fill="#5b21b6">B</text>

  <!-- Shape A: triangle, bottom corners at y=120 — exactly ON B's top edge -->
  <polygon points="360,42 290,120 430,120"
           fill="#dbeafe" fill-opacity="0.7" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="360" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">A</text>

  <!-- Mark the two bottom vertices of A sitting on B's edge -->
  <circle cx="290" cy="120" r="7" fill="#15803d" stroke="white" stroke-width="2"/>
  <circle cx="430" cy="120" r="7" fill="#15803d" stroke="white" stroke-width="2"/>

  <line x1="290" y1="111" x2="290" y2="88" stroke="#166534" stroke-width="1.2"/>
  <text x="290" y="83" text-anchor="middle" font-size="10" fill="#166534">vertex on B's edge</text>

  <text x="360" y="198" text-anchor="middle" font-size="11" fill="#475569">A's corner landing on B's boundary is handled</text>
</svg>
