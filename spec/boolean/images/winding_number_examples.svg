<svg width="600" height="480" viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: system-ui, sans-serif; }</style>
  <defs>
    <marker id="ray" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0,0 7,3.5 0,7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Grid dividers -->
  <line x1="300" y1="0" x2="300" y2="480" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="0"   y1="240" x2="600" y2="240" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════
       Panel 1 — CCW circle, P inside   (top-left)
       ══════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="300" height="240" fill="#f0f9ff"/>
  <text x="150" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">CCW circle — P inside</text>

  <circle cx="150" cy="125" r="65" fill="#bfdbfe" fill-opacity="0.5" stroke="#2563eb" stroke-width="2.5"/>
  <!-- CCW rotation glyph -->
  <text x="150" y="73" text-anchor="middle" font-size="24" fill="#2563eb">↺</text>

  <!-- P at centre -->
  <circle cx="150" cy="125" r="4" fill="#1e293b"/>
  <text x="158" y="121" font-size="11" font-weight="600" fill="#1e293b">P</text>

  <!-- Ray rightward -->
  <line x1="150" y1="125" x2="283" y2="125"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ray)"/>

  <!-- Right crossing dot (150+65=215) -->
  <circle cx="215" cy="125" r="5" fill="white" stroke="#15803d" stroke-width="1.8"/>
  <!-- Upward arrow: CCW right side travels upward on screen -->
  <line x1="226" y1="141" x2="226" y2="115" stroke="#15803d" stroke-width="2"/>
  <polygon points="222,115 230,115 226,107" fill="#15803d"/>
  <text x="234" y="128" font-size="12" font-weight="700" fill="#15803d">+1</text>

  <text x="150" y="207" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">w = +1</text>
  <text x="150" y="227" text-anchor="middle" font-size="10" fill="#64748b">one crossing, boundary going up → +1</text>


  <!-- ══════════════════════════════════════════════════════
       Panel 2 — CCW circle, P outside   (top-right)
       ══════════════════════════════════════════════════════ -->
  <rect x="300" y="0" width="300" height="240" fill="#f0f9ff"/>
  <text x="450" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">CCW circle — P outside</text>

  <circle cx="450" cy="125" r="65" fill="#bfdbfe" fill-opacity="0.5" stroke="#2563eb" stroke-width="2.5"/>
  <text x="450" y="73" text-anchor="middle" font-size="24" fill="#2563eb">↺</text>

  <!-- P to the left of circle -->
  <circle cx="318" cy="125" r="4" fill="#1e293b"/>
  <text x="326" y="121" font-size="11" font-weight="600" fill="#1e293b">P</text>

  <!-- Ray through both crossings -->
  <line x1="318" y1="125" x2="584" y2="125"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ray)"/>

  <!-- Left crossing (450-65=385): CCW left side travels downward on screen -->
  <circle cx="385" cy="125" r="5" fill="white" stroke="#dc2626" stroke-width="1.8"/>
  <line x1="376" y1="109" x2="376" y2="135" stroke="#dc2626" stroke-width="2"/>
  <polygon points="372,135 380,135 376,143" fill="#dc2626"/>
  <text x="342" y="128" font-size="12" font-weight="700" fill="#dc2626">−1</text>

  <!-- Right crossing (450+65=515): CCW right side travels upward on screen -->
  <circle cx="515" cy="125" r="5" fill="white" stroke="#15803d" stroke-width="1.8"/>
  <line x1="525" y1="141" x2="525" y2="115" stroke="#15803d" stroke-width="2"/>
  <polygon points="521,115 529,115 525,107" fill="#15803d"/>
  <text x="533" y="128" font-size="12" font-weight="700" fill="#15803d">+1</text>

  <text x="450" y="207" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">w = 0</text>
  <text x="450" y="227" text-anchor="middle" font-size="10" fill="#64748b">(−1) + (+1) = 0 — crossings cancel</text>


  <!-- ══════════════════════════════════════════════════════
       Panel 3 — CW circle, P inside   (bottom-left)
       ══════════════════════════════════════════════════════ -->
  <rect x="0" y="240" width="300" height="240" fill="#fff1f2"/>
  <text x="150" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#9f1239">CW circle — P inside</text>

  <circle cx="150" cy="365" r="65" fill="#fecdd3" fill-opacity="0.5" stroke="#be185d" stroke-width="2.5"/>
  <text x="150" y="313" text-anchor="middle" font-size="24" fill="#be185d">↻</text>

  <!-- P at centre -->
  <circle cx="150" cy="365" r="4" fill="#1e293b"/>
  <text x="158" y="361" font-size="11" font-weight="600" fill="#1e293b">P</text>

  <!-- Ray rightward -->
  <line x1="150" y1="365" x2="283" y2="365"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ray)"/>

  <!-- Right crossing (150+65=215): CW right side travels downward on screen -->
  <circle cx="215" cy="365" r="5" fill="white" stroke="#dc2626" stroke-width="1.8"/>
  <line x1="226" y1="349" x2="226" y2="375" stroke="#dc2626" stroke-width="2"/>
  <polygon points="222,375 230,375 226,383" fill="#dc2626"/>
  <text x="234" y="369" font-size="12" font-weight="700" fill="#dc2626">−1</text>

  <text x="150" y="447" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">w = −1</text>
  <text x="150" y="467" text-anchor="middle" font-size="10" fill="#64748b">one crossing, boundary going down → −1</text>


  <!-- ══════════════════════════════════════════════════════
       Panel 4 — CW circle, P outside   (bottom-right)
       ══════════════════════════════════════════════════════ -->
  <rect x="300" y="240" width="300" height="240" fill="#fff1f2"/>
  <text x="450" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#9f1239">CW circle — P outside</text>

  <circle cx="450" cy="365" r="65" fill="#fecdd3" fill-opacity="0.5" stroke="#be185d" stroke-width="2.5"/>
  <text x="450" y="313" text-anchor="middle" font-size="24" fill="#be185d">↻</text>

  <!-- P to the left of circle -->
  <circle cx="318" cy="365" r="4" fill="#1e293b"/>
  <text x="326" y="361" font-size="11" font-weight="600" fill="#1e293b">P</text>

  <!-- Ray through both crossings -->
  <line x1="318" y1="365" x2="584" y2="365"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ray)"/>

  <!-- Left crossing (450-65=385): CW left side travels upward on screen -->
  <circle cx="385" cy="365" r="5" fill="white" stroke="#15803d" stroke-width="1.8"/>
  <line x1="376" y1="381" x2="376" y2="355" stroke="#15803d" stroke-width="2"/>
  <polygon points="372,355 380,355 376,347" fill="#15803d"/>
  <text x="342" y="368" font-size="12" font-weight="700" fill="#15803d">+1</text>

  <!-- Right crossing (450+65=515): CW right side travels downward on screen -->
  <circle cx="515" cy="365" r="5" fill="white" stroke="#dc2626" stroke-width="1.8"/>
  <line x1="525" y1="349" x2="525" y2="375" stroke="#dc2626" stroke-width="2"/>
  <polygon points="521,375 529,375 525,383" fill="#dc2626"/>
  <text x="533" y="370" font-size="12" font-weight="700" fill="#dc2626">−1</text>

  <text x="450" y="447" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">w = 0</text>
  <text x="450" y="467" text-anchor="middle" font-size="10" fill="#64748b">(+1) + (−1) = 0 — crossings cancel</text>
</svg>
