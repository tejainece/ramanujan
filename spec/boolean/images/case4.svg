<svg width="480" height="210" viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: system-ui, sans-serif; }
  </style>

  <!-- ── LEFT PANEL: transversal edge crossings ── -->
  <rect x="0" y="0" width="240" height="210" fill="#f8fafc"/>
  <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">edges cross at discrete points</text>

  <rect x="20" y="45" width="140" height="90" fill="#dbeafe" fill-opacity="0.7" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="80" y="85" width="140" height="90" fill="#ede9fe" fill-opacity="0.7" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- Crossing points: (160,85) and (80,135) -->
  <circle cx="160" cy="85"  r="5" fill="#1e293b" stroke="white" stroke-width="1.5"/>
  <circle cx="80"  cy="135" r="5" fill="#1e293b" stroke="white" stroke-width="1.5"/>

  <text x="38"  y="75"  font-size="14" font-weight="700" fill="#1d4ed8">A</text>
  <text x="195" y="165" font-size="14" font-weight="700" fill="#5b21b6">B</text>

  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#475569">boundaries meet at 2 discrete points</text>

  <!-- ── DIVIDER ── -->
  <line x1="240" y1="10" x2="240" y2="200" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ── RIGHT PANEL: shared boundary segment (also supported) ── -->
  <rect x="240" y="0" width="240" height="210" fill="#f0fdf4"/>
  <text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">shared boundary segment — supported</text>

  <!-- A (lower): x=255..395, y=110..180 -->
  <rect x="255" y="110" width="140" height="70" fill="#dbeafe" fill-opacity="0.7" stroke="#2563eb" stroke-width="2.5"/>
  <!-- B (upper): x=315..455, y=40..110 -->
  <rect x="315" y="40"  width="140" height="70" fill="#ede9fe" fill-opacity="0.7" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- Shared segment: x=315..395, y=110 -->
  <line x1="315" y1="110" x2="395" y2="110" stroke="#15803d" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="315" y1="103" x2="315" y2="117" stroke="#15803d" stroke-width="2"/>
  <line x1="395" y1="103" x2="395" y2="117" stroke="#15803d" stroke-width="2"/>

  <text x="268"  y="150" font-size="14" font-weight="700" fill="#1d4ed8">A</text>
  <text x="432"  y="78"  font-size="14" font-weight="700" fill="#5b21b6">B</text>

  <line x1="355" y1="115" x2="355" y2="138" stroke="#166534" stroke-width="1.2"/>
  <text x="355" y="150" text-anchor="middle" font-size="10" fill="#166534">collinear shared edge</text>

  <text x="360" y="198" text-anchor="middle" font-size="11" fill="#475569">A's top edge and B's bottom edge coincide</text>
</svg>
