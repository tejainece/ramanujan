<svg width="480" height="210" viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- ── LEFT PANEL: simple path, w=1 everywhere ── -->
  <rect x="0" y="0" width="240" height="210" fill="#f8fafc"/>
  <text x="120" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">simple path</text>

  <rect x="30" y="50" width="170" height="110" fill="#dbeafe" fill-opacity="0.7" stroke="#2563eb" stroke-width="2.5"/>

  <!-- direction arrow -->
  <path d="M 110,50 L 140,50" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="115" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">w = 1</text>
  <text x="15"  y="112" font-size="12" fill="#94a3b8">w = 0</text>
  <text x="215" y="112" font-size="12" fill="#94a3b8">0</text>

  <text x="120" y="196" text-anchor="middle" font-size="11" fill="#475569">filter: w ≠ 0 → inside (non-zero rule)</text>

  <!-- ── DIVIDER ── -->
  <line x1="240" y1="10" x2="240" y2="200" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ── RIGHT PANEL: self-intersecting pentagram, w=1 outer / w=2 center ── -->
  <rect x="240" y="0" width="240" height="210" fill="#f0fdf4"/>
  <text x="360" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">self-intersecting path — supported</text>

  <!-- pentagram: p1→p3→p5→p2→p4→p1
       center=(360,105), outer r=52
       p1=(360,53) p2=(409,89) p3=(391,147) p4=(329,147) p5=(311,89) -->
  <!-- outer fill (tips), w=1 -->
  <polygon points="360,53 391,147 311,89 409,89 329,147"
           fill="#dbeafe" fill-opacity="0.75" fill-rule="evenodd"
           stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- inner pentagon (w=2): vertices at intersections -->
  <polygon points="372,89 379,111 360,125 341,111 348,89"
           fill="#93c5fd" fill-opacity="0.9"/>

  <!-- winding labels -->
  <text x="360" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">w = 2</text>
  <text x="360" y="68" text-anchor="middle" font-size="11" fill="#1d4ed8">w = 1</text>
  <text x="306" y="140" text-anchor="middle" font-size="11" fill="#1d4ed8">w = 1</text>
  <text x="414" y="140" text-anchor="middle" font-size="11" fill="#1d4ed8">w = 1</text>
  <text x="257" y="100" font-size="11" fill="#94a3b8">w = 0</text>

  <text x="360" y="196" text-anchor="middle" font-size="11" fill="#475569">filter uses winding count, not a boolean</text>
</svg>
