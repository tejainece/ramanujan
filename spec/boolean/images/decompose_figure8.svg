<svg width="480" height="210" viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- ── LEFT PANEL: one self-intersecting path ── -->
  <rect x="0" y="0" width="240" height="210" fill="#f8fafc"/>
  <text x="120" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">input: 1 self-intersecting path</text>

  <!-- figure-8 as a single self-crossing path (stroke only) -->
  <path d="M 190,108
           C 190,58  120,58  120,108
           C 120,158  50,158  50,108
           C  50,58  120,58  120,108
           C 120,158 190,158 190,108 Z"
        fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- self-crossing point -->
  <circle cx="120" cy="108" r="6" fill="#1e293b" stroke="white" stroke-width="2"/>
  <line x1="120" y1="100" x2="120" y2="74" stroke="#374151" stroke-width="1.2"/>
  <text x="120" y="69" text-anchor="middle" font-size="10" fill="#374151">self-crossing</text>

  <text x="120" y="196" text-anchor="middle" font-size="11" fill="#475569">one path, crosses itself once</text>

  <!-- ── DIVIDER ── -->
  <line x1="240" y1="10" x2="240" y2="200" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ── RIGHT PANEL: 2 output faces ── -->
  <rect x="240" y="0" width="240" height="210" fill="#f0fdf4"/>
  <text x="360" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">output: 2 simple closed paths</text>

  <!-- left face (same curves as left half of figure-8, shifted left 15px) -->
  <path d="M 345,108
           C 345,158 275,158 275,108
           C 275,58  345,58  345,108 Z"
        fill="#dbeafe" fill-opacity="0.8" stroke="#2563eb" stroke-width="2.5"/>

  <!-- right face (same curves as right half of figure-8, shifted right 15px) -->
  <path d="M 375,108
           C 375,58  445,58  445,108
           C 445,158 375,158 375,108 Z"
        fill="#bbf7d0" fill-opacity="0.8" stroke="#15803d" stroke-width="2.5"/>

  <text x="310" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">face 1</text>
  <text x="410" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">face 2</text>

  <text x="360" y="196" text-anchor="middle" font-size="11" fill="#475569">both faces returned — no filtering</text>
</svg>
