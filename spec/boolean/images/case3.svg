<svg width="480" height="210" viewBox="0 0 480 210" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: system-ui, sans-serif; }
  </style>

  <!-- ── LEFT PANEL: transversal crossing ── -->
  <rect x="0" y="0" width="240" height="210" fill="#f8fafc"/>
  <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">transversal crossing</text>

  <circle cx="80"  cy="112" r="50" fill="#dbeafe" fill-opacity="0.7" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="160" cy="112" r="50" fill="#ede9fe" fill-opacity="0.7" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- Intersection points: centers 80px apart, r=50 → x=120, y_off=30 -->
  <circle cx="120" cy="82"  r="5" fill="#1e293b" stroke="white" stroke-width="1.5"/>
  <circle cx="120" cy="142" r="5" fill="#1e293b" stroke="white" stroke-width="1.5"/>

  <text x="62"  y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">A</text>
  <text x="178" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">B</text>

  <line x1="126" y1="80" x2="148" y2="58" stroke="#374151" stroke-width="1.2"/>
  <text x="150" y="55" font-size="10" fill="#374151">cross ×2</text>

  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#475569">each boundary passes through the other</text>

  <!-- ── DIVIDER ── -->
  <line x1="240" y1="10" x2="240" y2="200" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ── RIGHT PANEL: tangential / grazing (also supported) ── -->
  <rect x="240" y="0" width="240" height="210" fill="#f0fdf4"/>
  <text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">tangential / grazing — supported</text>

  <!-- Externally tangent circles: centers at (295,112) and (385,112), r=45, touch at (340,112) -->
  <circle cx="295" cy="112" r="45" fill="#dbeafe" fill-opacity="0.7" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="385" cy="112" r="45" fill="#ede9fe" fill-opacity="0.7" stroke="#7c3aed" stroke-width="2.5"/>

  <circle cx="340" cy="112" r="6" fill="#15803d" stroke="white" stroke-width="2"/>

  <text x="278" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">A</text>
  <text x="402" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">B</text>

  <line x1="340" y1="104" x2="340" y2="78" stroke="#166534" stroke-width="1.2"/>
  <text x="340" y="73" text-anchor="middle" font-size="10" fill="#166534">touch ×1</text>

  <text x="360" y="198" text-anchor="middle" font-size="11" fill="#475569">boundaries that only kiss are handled correctly</text>
</svg>
